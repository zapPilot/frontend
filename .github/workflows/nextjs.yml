# Build and deploy the Vite SPA to GitHub Pages
name: Deploy to Pages

on:
  workflow_run:
    workflows: ["Code Quality"]
    branches: ["main"]
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        env:
          VITE_INTENT_ENGINE_URL: ${{ secrets.NEXT_PUBLIC_INTENT_ENGINE_URL }}
          VITE_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          VITE_ACCOUNT_API_URL: ${{ secrets.NEXT_PUBLIC_ACCOUNT_API_URL }}
          VITE_ANALYTICS_ENGINE_URL: ${{ secrets.NEXT_PUBLIC_ANALYTICS_ENGINE_URL }}
        run: pnpm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
